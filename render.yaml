services:
  - type: web
    name: reel-automation-backend
    runtime: python
    rootDir: backend           # <-- tells Render to cd into backend/ first
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      # ── Set the values below in the Render dashboard (Secrets) ──────────────
      # GEMINI_API_KEY, GROQ_API_KEY, OPENAI_API_KEY
      # PEXELS_API_KEY, ELEVENLABS_API_KEY, ELEVENLABS_VOICE_ID
      # AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_BUCKET_NAME, AWS_REGION
      # IG_USER_ID, IG_ACCESS_TOKEN
      # GITHUB_PAT, GITHUB_REPO, GITHUB_BRANCH
      # CORS_ORIGIN  (comma-separated extra frontend origins, if needed)
